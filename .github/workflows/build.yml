name: Build standalone executables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch_name: windows-x64
          - os: macos-14
            arch_name: macos-silicon
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python mediapipe pyautogui pyinstaller

      - name: Download hand_landmarker.task
        run: |
          curl -L -o src/hand_landmarker.task "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        shell: bash

      - name: Build with PyInstaller
        run: |
          cd src
          pyinstaller gestures.spec --clean -y

      - name: Compress artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path src/dist/FlowMinds -DestinationPath src/dist/FlowMinds-${{ matrix.arch_name }}.zip

      - name: Compress artifacts (macOS)
        if: matrix.os == 'macos-14'
        run: |
          cd src/dist
          codesign --force --deep -s - FlowMinds.app
          ditto -c -k --sequesterRsrc --keepParent FlowMinds.app FlowMinds-${{ matrix.arch_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowMinds-${{ matrix.arch_name }}
          path: src/dist/FlowMinds-${{ matrix.arch_name }}.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (Desktop App)"
          files: artifacts/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
