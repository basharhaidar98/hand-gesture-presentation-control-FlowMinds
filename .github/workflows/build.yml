name: Build standalone executables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python mediapipe pyautogui pyinstaller

      - name: Download hand_landmarker.task
        run: |
          curl -L -o src/hand_landmarker.task "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        shell: bash

      - name: Build with PyInstaller
        run: |
          cd src
          pyinstaller gestures.spec --clean -y

      - name: Compress artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path src/dist/gestures -DestinationPath src/dist/gestures-windows.zip

      - name: Compress artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          zip -r src/dist/gestures-mac.zip src/dist/gestures.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestures-${{ matrix.os }}
          path: |
            src/dist/gestures-windows.zip
            src/dist/gestures-mac.zip
          if-no-files-found: ignore
